apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openclaw.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.bootstrapConfig.enabled }}
      initContainers:
        - name: bootstrap-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace
              if [ ! -f {{ .Values.bootstrapConfig.filePath | quote }} ]{{- if .Values.bootstrapConfig.reconcileControlUiFallback }} || ! grep -q 'dangerouslyAllowHostHeaderOriginFallback' {{ .Values.bootstrapConfig.filePath | quote }}{{- end }}; then
                printf '%s\n' '{"gateway":{"mode":"{{ .Values.bootstrapConfig.gatewayMode }}","controlUi":{"dangerouslyAllowHostHeaderOriginFallback":{{ ternary "true" "false" .Values.bootstrapConfig.controlUi.dangerouslyAllowHostHeaderOriginFallback }}}}}' > {{ .Values.bootstrapConfig.filePath | quote }}
              fi
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: workspace
              mountPath: /home/node/.openclaw/workspace
      {{- end }}
      containers:
        - name: {{ include "openclaw.name" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
            - name: bridge
              containerPort: {{ .Values.service.bridgeTargetPort }}
              protocol: TCP
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.startupProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.livenessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.readinessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if or .Values.gatewayToken.enabled .Values.env }}
          env:
            {{- if .Values.gatewayToken.enabled }}
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.gatewayTokenSecretName" . }}
                  key: {{ .Values.gatewayToken.secretKey }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: workspace
              mountPath: /home/node/.openclaw/workspace
      volumes:
        - name: config
          {{- if .Values.persistence.config.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-config" (include "openclaw.fullname" .)) .Values.persistence.config.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: workspace
          {{- if .Values.persistence.workspace.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-workspace" (include "openclaw.fullname" .)) .Values.persistence.workspace.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
