{{- if and .Values.gatewayToken.enabled (not .Values.gatewayToken.existingSecret) }}
{{- $secretName := include "openclaw.gatewayTokenSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.gatewayToken.secretKey }}: {{- if .Values.gatewayToken.value }}
    {{ .Values.gatewayToken.value | quote }}
  {{- else if and $existing $existing.data (index $existing.data .Values.gatewayToken.secretKey) }}
    {{ index $existing.data .Values.gatewayToken.secretKey | b64dec | quote }}
  {{- else }}
    {{ randAlphaNum 64 | quote }}
  {{- end }}
{{- end }}
