replicaCount: 1

image:
  repository: ghcr.io/openclaw/openclaw
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 18789
  targetPort: 18789
  bridgePort: 18790
  bridgeTargetPort: 18790

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: openclaw.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

command:
  - node
  - dist/index.js
  - gateway
  - --bind
  - lan
  - --port
  - "18789"

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

env:
  - name: HOME
    value: /home/node
  - name: TERM
    value: xterm-256color
  - name: TZ
    value: UTC

gatewayToken:
  enabled: true
  existingSecret: ""
  secretKey: OPENCLAW_GATEWAY_TOKEN
  value: ""

persistence:
  config:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
    storageClassName: ""
  workspace:
    enabled: false
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    storageClassName: ""

livenessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 20
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  enabled: true
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
